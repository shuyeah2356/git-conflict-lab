name: Conflict CI Check

on:
  push:
  pull_request:

jobs:
  conflict-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check conflict markers
        run: python tools/conflict_lab.py ci-check
